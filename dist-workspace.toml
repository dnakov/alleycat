[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell", "npm", "homebrew", "msi"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "aarch64-pc-windows-msvc", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Where to host releases
hosting = "github"
# Whether to install an updater program
install-updater = false
# Homebrew tap repo where the auto-generated formula is published.
# Requires a `HOMEBREW_TAP_TOKEN` (or PAT-based equivalent) in GitHub Secrets.
tap = "alleycat/homebrew-tap"
# npm package name (unhyphenated `alleycat` is taken on the registry).
# Users still invoke the binary as `alleycat`; this only affects `npm install`.
npm-package = "alley-cat"
# Run the homebrew + npm publish jobs on tagged releases.
# Requires HOMEBREW_TAP_TOKEN and NPM_TOKEN in GitHub Secrets.
publish-jobs = ["homebrew", "npm"]
# Open a PR with the generated workflow on changes rather than overwriting silently.
pr-run-mode = "plan"
