name: release-build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-13
            ext: ""
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            ext: ".exe"
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release -p alleycat --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/alleycat${{ matrix.ext }}" \
             "dist/alleycat-${{ matrix.target }}${{ matrix.ext }}"

      - uses: actions/upload-artifact@v4
        with:
          name: alleycat-${{ matrix.target }}
          path: dist/alleycat-${{ matrix.target }}${{ matrix.ext }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
